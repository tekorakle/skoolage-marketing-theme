secrets:
  github_token_password:
    file: ./secrets/github_token_password.txt

services:
  # ── Builder ─────────────────────────────────────────────────────────────────
  # Default workflow: runs lint → typecheck → build, writes dist/ to ./output
  # Usage: docker compose build && docker compose up
  web:
    build:
      context: .
      target: builder
      network: host
    volumes:
      - ./output:/app/dist:z
      - type: tmpfs
        target: /app/.astro
        tmpfs:
          mode: 0777
    secrets:
      - github_token_password
    environment:
      - SITE_URL=https://www.apexcap.example
      - BASE_PATH=/
      - GITHUB_USER=apex-capital-group
      # Pass GITHUB_TOKEN from host env when running in CI/CD (GitLab, GitHub, Gitea).
      # entrypoint.sh prefers this over the Docker secrets file.
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - HOST_UID=${UID:-1000}
      - HOST_GID=${GID:-1000}

  # ── Nginx server ─────────────────────────────────────────────────────────────
  # Optional: bakes dist/ into a lean nginx image and serves it.
  # Use this on your production machine instead of copying files manually.
  # Usage: docker compose --profile serve build && docker compose --profile serve up -d
  apex-serve:
    build:
      context: .
      target: server
      secrets:
        - github_token_password
      args:
        - SITE_URL=https://www.apexcap.example
        - BASE_PATH=/
    container_name: apex-serve
    ports:
      - '80:80'
    restart: unless-stopped
    environment:
      - SITE_URL=https://www.apexcap.example
      - BASE_PATH=/
      - GITHUB_USER=apex-capital-group
    profiles:
      - serve
