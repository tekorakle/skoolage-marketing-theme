image: node:24-alpine

# ── Update dependencies ───────────────────────────────────────────────────────
# Manual trigger: CI/CD → Pipelines → Run pipeline → play button next to this job.
# Updates all pinned packages to latest, verifies the vite override, audits CVEs,
# pins the three.js CDN version, and commits the result back to the repo.
#
# Required: a project/personal access token with write_repository scope, stored as
# the CI/CD variable UPDATE_TOKEN. Enable it under Settings > CI/CD > Variables.
# (CI_JOB_TOKEN cannot push by default; a dedicated token is safer anyway.)
#
# ── Scheduled / automatic cron run ───────────────────────────────────────────
# GitLab CI does not support cron in the .gitlab-ci.yml file — schedules are
# configured entirely in the UI and stored server-side. To run this job on a
# recurring schedule (e.g. weekly):
#
#   1. Go to your project → CI/CD → Schedules → New schedule
#   2. Description:  "Weekly dependency update"
#   3. Interval:     Custom — enter cron expression: 0 6 * * 1  (Mon 06:00 UTC)
#   4. Target branch: main  (or whichever branch you deploy from)
#   5. Save pipeline schedule
#
# The schedule triggers a full pipeline run. Because this job has `when: manual`,
# it will NOT run automatically from the schedule — GitLab manual jobs are skipped
# by scheduled pipelines unless you change `when: manual` to `when: always` and
# use `rules:` to restrict it. To run update-deps on a schedule, replace the
# `when: manual` line below with the following rules block:
#
#   rules:
#     - if: '$CI_PIPELINE_SOURCE == "schedule"'   # runs automatically on schedule
#     - if: '$CI_PIPELINE_SOURCE == "web"'        # still runnable manually from UI
#       when: manual
update-deps:
  stage: deploy
  before_script:
    - npm install -g pnpm@11 --silent
    - git config user.name "gitlab-ci[bot]"
    - git config user.email "gitlab-ci[bot]@noreply.localhost"
    - git remote set-url origin "https://oauth2:${UPDATE_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
  script:
    - |
      PKGS="astro tailwindcss @tailwindcss/vite @astrojs/sitemap @astrojs/check \
            typescript eslint @typescript-eslint/parser eslint-plugin-astro \
            @types/node rss-parser prettier prettier-plugin-astro \
            prettier-plugin-tailwindcss"
      pnpm update $PKGS --latest
    - |
      VITE_VER=$(grep "^  vite@" pnpm-lock.yaml | head -1 | sed "s/^  vite@//;s/:.*//")
      echo "Resolved: vite@${VITE_VER}"
      case "$VITE_VER" in
        6.*) echo "PASS: standard Vite 6 in use (not rolldown-vite)" ;;
        *)
          echo "FAIL: vite@${VITE_VER} — expected 6.x from pnpm-workspace.yaml override"
          exit 1
          ;;
      esac
    - pnpm audit --audit-level=high
    - |
      THREE_LATEST=$(pnpm view three version)
      OLD_THREE=$(sed -n 's|.*cdn\.jsdelivr\.net/npm/three@\([^/]*\)/.*|\1|p' \
        scripts/download-assets.mjs | head -1)
      if [ "$OLD_THREE" != "$THREE_LATEST" ]; then
        sed -i "s|/npm/three@[^/]*/|/npm/three@$THREE_LATEST/|g" scripts/download-assets.mjs
        rm -f public/scripts/three.min.js
        echo "three.js: $OLD_THREE → $THREE_LATEST"
      else
        echo "three.js already at $THREE_LATEST — no change"
      fi
    - |
      TIMESTAMP=$(date -u +"%Y-%m-%d")
      MARKER="<!-- packages-last-updated:"
      NEW_LINE="<!-- packages-last-updated: ${TIMESTAMP} -->"
      if grep -q "$MARKER" README.md; then
        sed -i "s|${MARKER}[^>]*>|${NEW_LINE}|" README.md
      else
        printf "\n---\n\n%s\n" "$NEW_LINE" >> README.md
      fi
    - |
      git add package.json pnpm-lock.yaml README.md scripts/download-assets.mjs
      if git diff --cached --quiet; then
        echo "All packages already up to date — nothing to commit."
      else
        git commit -m "chore: update pinned dependencies"
        git push origin HEAD:${CI_COMMIT_REF_NAME}
      fi
  when: manual

pages:
  stage: deploy
  script:
    - npm install -g pnpm@11 --silent
    - pnpm install
    - |
      # CI_PAGES_URL is set by the GitLab runner to the full URL this project's
      # Pages will be served at (e.g. https://user.gitlab.io/project-name).
      # Derive BASE_PATH and SITE_URL from it when not set as CI/CD variables.
      if [ -z "$SITE_URL" ]; then
        export SITE_URL="$CI_PAGES_URL"
      fi
      if [ -z "$BASE_PATH" ]; then
        PAGES_PATH=$(echo "$CI_PAGES_URL" | sed 's|https://[^/]*||' | sed 's|/$||')
        if [ -z "$PAGES_PATH" ]; then
          export BASE_PATH="/"
        else
          export BASE_PATH="${PAGES_PATH}/"
        fi
      fi
    - pnpm run build
    - cp -r dist/. public
  artifacts:
    paths:
      - public
  # Manual trigger: go to CI/CD → Pipelines → Run pipeline in GitLab,
  # then click the play button next to the "pages" job.
  # Uncomment the lines below to automatically deploy on every push to main:
  # only:
  #   - main
  when: manual
