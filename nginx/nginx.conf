server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Compression ──────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        font/woff2;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: https:; connect-src 'self' https://api.web3forms.com; frame-ancestors 'none';" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

    # ── Font caching ─────────────────────────────────────────────────────────
    # Astro hashes font filenames — safe to cache forever
    location /_astro/fonts/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Hashed assets (JS/CSS bundles) ───────────────────────────────────────
    # Astro appends content hashes — safe to cache forever
    location ~* \.[0-9a-f]{8}\.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Images and icons ─────────────────────────────────────────────────────
    location /images/ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # ── HTML pages ───────────────────────────────────────────────────────────
    # Astro static output: /about/ → /about/index.html
    # Never cache HTML so deploys take effect immediately
    location / {
        try_files $uri $uri/ $uri.html =404;
        add_header Cache-Control "no-cache";
    }

    # ── Custom error pages ───────────────────────────────────────────────────
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
